<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Plantinvasion 🌿 — Botanik-RPG</title>
    <meta name="description" content="Züchte seltene Pflanzen, kreuze Hybriden und entdecke fünf Biome in diesem cozy Botanik-RPG." />
    <meta name="theme-color" content="#2d3a2a" />
    <!-- D-041 R17: SVG-Favicon (inline, kein extra Datei-Request) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%232d3a2a'/><text y='24' x='4' font-size='22'>🌿</text></svg>" />
    <style>
      html, body { margin: 0; padding: 0; background: #1a1a2e; }
      body { display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: system-ui, sans-serif; color: #eee; }
      /* Game container nutzt komplette Viewport-Hoehe und passende Breite je nach Orientierung */
      #game { width: 100vw; height: 100vh; max-height: 100vh; outline: none; display: flex; justify-content: center; align-items: center; }
      #game canvas { outline: none !important; }
      /* Auf sehr breiten Bildschirmen die Canvas-Box etwas einschraenken so dass UI nicht ausserhalb sichtbar wird */
      @media (min-width: 1024px) {
        #game { max-width: 1100px; }
      }
    </style>
  </head>
  <body>
    <div id="game" tabindex="0"></div>
    <script>
      // Auto-Focus auf Game-Container damit Keyboard-Events sofort ankommen
      window.addEventListener('load', () => {
        const el = document.getElementById('game');
        if (el) { el.focus(); el.addEventListener('click', () => el.focus()); }
      });
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
