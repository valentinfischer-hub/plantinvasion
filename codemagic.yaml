workflows:
  web-build:
    name: Plantinvasion Web Build
    instance_type: linux_x2
    max_build_duration: 30
    environment:
      node: 22
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: TypeScript check
        script: |
          npm run typecheck
      - name: Build
        script: |
          npm run build
    artifacts:
      - dist/**
