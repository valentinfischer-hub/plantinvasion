workflows:
  web-build:
    name: Plantinvasion Web Build
    # Free-Tier-kompatibel: mac_mini_m2 (500 Mac-Min/Monat gratis)
    # Spaeter eventuell auf Netlify auslagern fuer Web, Codemagic nur fuer Mobile.
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      node: 22
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: TypeScript check
        script: |
          npm run typecheck
      - name: Build
        script: |
          npm run build
    artifacts:
      - dist/**
